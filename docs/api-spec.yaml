            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/admin/payouts:
    get:
      tags:
      - Admin
      summary: Get Payout History
      description: Get all payout transactions.
      operationId: get_payout_history_api_admin_payouts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /:
    get:
      summary: Root
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /health:
    get:
      summary: Health
      description: Liveness probe.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /ready:
    get:
      summary: Ready
      description: Readiness probe with database connectivity and runtime metadata.
      operationId: ready_ready_get
      responses:
        '200':
