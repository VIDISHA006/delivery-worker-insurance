      - HTTPBearer: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
          title: Claim Id
      - name: notes
        in: query
        required: false
        schema:
          type: string
          title: Notes
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
