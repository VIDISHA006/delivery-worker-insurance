  /api/auth/me:
    get:
      tags:
      - Authentication
      summary: Get My Profile
      description: Get the authenticated worker profile.
      operationId: get_my_profile_api_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerResponse'
      security:
      - HTTPBearer: []
  /api/auth/profile/{worker_id}:
    get:
      tags:
      - Authentication
      summary: Get Profile
      description: Admin-only worker profile lookup.
      operationId: get_profile_api_auth_profile__worker_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: worker_id
        in: path
        required: true
        schema:
          type: integer
          title: Worker Id
      responses:
        '200':
          description: Successful Response
