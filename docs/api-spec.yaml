  /api/triggers/check/{zone}:
    post:
      tags:
      - Triggers
      summary: Check Zone Triggers
      description: Check all 5 triggers for a zone (simulates 15-min polling cycle).
      operationId: check_zone_triggers_api_triggers_check__zone__post
      parameters:
      - name: zone
        in: path
        required: true
        schema:
          type: string
          title: Zone
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/triggers/simulate/{trigger_type}:
    post:
      tags:
      - Triggers
      summary: Simulate Trigger
      description: Simulate a trigger event for demo — fires trigger and processes
        claims.
      operationId: simulate_trigger_api_triggers_simulate__trigger_type__post
      security:
      - HTTPBearer: []
      parameters:
      - name: trigger_type
        in: path
        required: true
        schema:
          type: string
          title: Trigger Type
      - name: zone
        in: query
        required: false
        schema:
          type: string
          default: Indiranagar
          title: Zone
      - name: severity
        in: query
        required: false
        schema:
          type: string
          default: severe
