      summary: Resolve Trigger
      description: Mark a trigger as resolved.
      operationId: resolve_trigger_api_triggers__trigger_id__resolve_put
      security:
      - HTTPBearer: []
      parameters:
      - name: trigger_id
        in: path
        required: true
        schema:
          type: integer
          title: Trigger Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
