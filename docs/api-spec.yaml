      parameters:
      - name: policy_id
        in: path
        required: true
        schema:
          type: integer
          title: Policy Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
