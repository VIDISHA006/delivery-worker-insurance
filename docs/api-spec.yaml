      summary: Get Zone Live Status
      description: Get live status of all environmental signals for a zone.
      operationId: get_zone_live_status_api_triggers_zone_status__zone__get
      parameters:
      - name: zone
        in: path
        required: true
        schema:
          type: string
          title: Zone
      responses:
