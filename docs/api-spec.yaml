            application/json:
              schema: {}
  /metrics:
    get:
      summary: Metrics
      description: Operational snapshot for the hackathon deployment.
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    AccountDeleteRequest:
      properties:
        otp:
          type: string
          title: Otp
        confirmation_text:
          type: string
          title: Confirmation Text
      type: object
      required:
      - otp
      - confirmation_text
      title: AccountDeleteRequest
    AdminLoginRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
      type: object
      required:
      - username
      - password
      title: AdminLoginRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    KYCVerify:
      properties:
        worker_id:
          type: integer
          title: Worker Id
        aadhaar_number:
          type: string
          pattern: ^\d{12}$
          title: Aadhaar Number
      type: object
      required:
      - worker_id
      - aadhaar_number
      title: KYCVerify
    OTPVerify:
      properties:
        phone:
          type: string
          title: Phone
        otp:
          type: string
          title: Otp
      type: object
      required:
      - phone
      - otp
      title: OTPVerify
    PolicyCreate:
      properties:
        worker_id:
          type: integer
          title: Worker Id
        plan_type:
          type: string
          title: Plan Type
          default: standard
      type: object
      required:
      - worker_id
      title: PolicyCreate
    PolicyResponse:
      properties:
        id:
          type: integer
          title: Id
        worker_id:
          type: integer
          title: Worker Id
        plan_type:
          type: string
          title: Plan Type
        weekly_premium:
          type: number
          title: Weekly Premium
        coverage_amount:
          type: number
          title: Coverage Amount
        status:
          type: string
          title: Status
        auto_renew:
          type: boolean
          title: Auto Renew
        start_date:
          type: string
          format: date-time
          title: Start Date
        end_date:
          type: string
          format: date-time
          title: End Date
        weeks_active:
          type: integer
          title: Weeks Active
        total_premiums_paid:
          type: number
          title: Total Premiums Paid
        total_claims_paid:
          type: number
          title: Total Claims Paid
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - worker_id
      - plan_type
      - weekly_premium
      - coverage_amount
      - status
      - auto_renew
      - start_date
      - end_date
      - weeks_active
      - total_premiums_paid
      - total_claims_paid
      - created_at
      title: PolicyResponse
    PremiumCalculateRequest:
      properties:
        zone:
          type: string
          title: Zone
        worker_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Worker Id
        week_of_year:
          anyOf:
          - type: integer
          - type: 'null'
          title: Week Of Year
      type: object
      required:
      - zone
      title: PremiumCalculateRequest
    UPISetup:
      properties:
        worker_id:
          type: integer
          title: Worker Id
        upi_id:
          type: string
          title: Upi Id
      type: object
