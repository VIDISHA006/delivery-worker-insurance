      summary: Get Claim Detail
      description: Get detailed claim information with fraud analysis.
      operationId: get_claim_detail_api_claims__claim_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
          title: Claim Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/claims/{claim_id}/approve:
    put:
      tags:
      - Claims
      summary: Approve
      description: 'Admin: Approve a pending claim.'
      operationId: approve_api_claims__claim_id__approve_put
      security:
      - HTTPBearer: []
      parameters:
      - name: claim_id
        in: path
        required: true
        schema:
          type: integer
          title: Claim Id
      - name: notes
        in: query
        required: false
        schema:
          type: string
          title: Notes
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/claims/{claim_id}/reject:
    put:
      tags:
      - Claims
      summary: Reject
      description: 'Admin: Reject a pending claim.'
      operationId: reject_api_claims__claim_id__reject_put
