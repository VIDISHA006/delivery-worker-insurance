openapi: 3.1.0
info:
  title: GigBuddy API
  description: Parametric Income Protection for Q-Commerce Delivery Partners
  version: 2.1.0
paths:
  /api/auth/login:
    post:
      tags:
      - Authentication
      summary: Login Worker
      description: Login an existing worker with phone and OTP.
      operationId: login_worker_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerify'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/register:
    post:
      tags:
      - Authentication
      summary: Register Worker
      description: Register a new delivery worker.
      operationId: register_worker_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerRegister'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/verify-otp:
    post:
      tags:
      - Authentication
      summary: Verify Otp
      description: 'Verify phone OTP. Mock: accepts ''1234'' for any phone.'
      operationId: verify_otp_api_auth_verify_otp_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerify'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/kyc:
    post:
      tags:
      - Authentication
      summary: Verify Kyc
      description: 'Aadhaar e-KYC verification. Mock: instant verification.'
      operationId: verify_kyc_api_auth_kyc_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KYCVerify'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/auth/setup-upi:
    post:
      tags:
      - Authentication
      summary: Setup Upi
      description: Setup UPI AutoPay mandate.
      operationId: setup_upi_api_auth_setup_upi_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UPISetup'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/auth/admin/login:
    post:
      tags:
      - Authentication
      summary: Admin Login
      description: Create an admin session for the operations portal.
      operationId: admin_login_api_auth_admin_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
