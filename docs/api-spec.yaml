  /api/premium/calculate:
    post:
      tags:
      - Premium
      summary: Calculate Zone Premium
      description: Calculate dynamic premium for a zone using XGBoost risk model.
      operationId: calculate_zone_premium_api_premium_calculate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PremiumCalculateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
