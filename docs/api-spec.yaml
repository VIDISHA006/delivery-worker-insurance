  /api/policies/all:
    get:
      tags:
      - Policies
      summary: List All Policies
      description: 'Admin: List all policies.'
      operationId: list_all_policies_api_policies_all_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
