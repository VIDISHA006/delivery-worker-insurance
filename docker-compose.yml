services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gigbuddy
      POSTGRES_USER: gigbuddy
      POSTGRES_PASSWORD: ${GIGBUDDY_POSTGRES_PASSWORD:-gigbuddy_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigbuddy -d gigbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GIGBUDDY_ENV: ${GIGBUDDY_ENV:-development}
      GIGBUDDY_APP_VERSION: ${GIGBUDDY_APP_VERSION:-2.1.0}
      GIGBUDDY_LOG_LEVEL: ${GIGBUDDY_LOG_LEVEL:-INFO}
      GIGBUDDY_DEMO_MODE: ${GIGBUDDY_DEMO_MODE:-true}
      GIGBUDDY_RATE_LIMIT_PER_MINUTE: ${GIGBUDDY_RATE_LIMIT_PER_MINUTE:-120}
      GIGBUDDY_ENABLE_BACKGROUND_JOBS: ${GIGBUDDY_ENABLE_BACKGROUND_JOBS:-true}
      GIGBUDDY_TRIGGER_POLL_INTERVAL_SECONDS: ${GIGBUDDY_TRIGGER_POLL_INTERVAL_SECONDS:-300}
      GIGBUDDY_CLAIM_REVIEW_INTERVAL_SECONDS: ${GIGBUDDY_CLAIM_REVIEW_INTERVAL_SECONDS:-180}
      GIGBUDDY_OTP_EXPIRY_SECONDS: ${GIGBUDDY_OTP_EXPIRY_SECONDS:-300}
      GIGBUDDY_OTP_COOLDOWN_SECONDS: ${GIGBUDDY_OTP_COOLDOWN_SECONDS:-60}
      GIGBUDDY_DATABASE_URL: ${GIGBUDDY_DATABASE_URL:-postgresql+psycopg2://gigbuddy:${GIGBUDDY_POSTGRES_PASSWORD:-gigbuddy_dev_password}@postgres:5432/gigbuddy}
      GIGBUDDY_ALLOWED_ORIGINS: ${GIGBUDDY_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      GIGBUDDY_JWT_SECRET: ${GIGBUDDY_JWT_SECRET:-change-me-before-production}
      GIGBUDDY_DEMO_OTP: ${GIGBUDDY_DEMO_OTP:-1234}
      GIGBUDDY_SEED_DEMO_DATA: ${GIGBUDDY_SEED_DEMO_DATA:-true}
      GIGBUDDY_SUPPORT_EMAIL: ${GIGBUDDY_SUPPORT_EMAIL:-support@gigbuddy.example}
      GIGBUDDY_SUPPORT_PHONE: ${GIGBUDDY_SUPPORT_PHONE:-+91-00000-00000}
      GIGBUDDY_ADMIN_USERNAME: ${GIGBUDDY_ADMIN_USERNAME:-ops@gigbuddy.local}
      GIGBUDDY_ADMIN_PASSWORD: ${GIGBUDDY_ADMIN_PASSWORD:-GigBuddyAdmin123!}
      GIGBUDDY_TWILIO_ACCOUNT_SID: ${GIGBUDDY_TWILIO_ACCOUNT_SID:-}
      GIGBUDDY_TWILIO_AUTH_TOKEN: ${GIGBUDDY_TWILIO_AUTH_TOKEN:-}
      GIGBUDDY_TWILIO_FROM_NUMBER: ${GIGBUDDY_TWILIO_FROM_NUMBER:-}
      GIGBUDDY_KYC_BASE_URL: ${GIGBUDDY_KYC_BASE_URL:-}
      GIGBUDDY_KYC_API_KEY: ${GIGBUDDY_KYC_API_KEY:-}
      GIGBUDDY_PAYMENT_GATEWAY_BASE_URL: ${GIGBUDDY_PAYMENT_GATEWAY_BASE_URL:-}
      GIGBUDDY_PAYMENT_GATEWAY_API_KEY: ${GIGBUDDY_PAYMENT_GATEWAY_API_KEY:-}
      GIGBUDDY_RAZORPAY_KEY_ID: ${GIGBUDDY_RAZORPAY_KEY_ID:-}
      GIGBUDDY_RAZORPAY_KEY_SECRET: ${GIGBUDDY_RAZORPAY_KEY_SECRET:-}
      GIGBUDDY_GUIDEWIRE_BASE_URL: ${GIGBUDDY_GUIDEWIRE_BASE_URL:-}
      GIGBUDDY_GUIDEWIRE_CLIENT_ID: ${GIGBUDDY_GUIDEWIRE_CLIENT_ID:-}
      GIGBUDDY_GUIDEWIRE_CLIENT_SECRET: ${GIGBUDDY_GUIDEWIRE_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
